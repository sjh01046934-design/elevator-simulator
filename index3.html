<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>승강기 검색 서비스 - 실무 현장용</title>
    
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=59f58919246c9ac3780496fc7e2c0d74&libraries=services&autoload=false"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
        .app-container { width: 100%; max-width: 412px; height: 100vh; background-color: #e5e5e5; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
        #map { width: 100%; height: 100%; z-index: 1; }
        .search-bar-wrapper { position: absolute; top: 0; left: 0; right: 0; padding: 35px 16px 10px 16px; background: linear-gradient(to bottom, rgba(255,255,255,0.9) 70%, rgba(255,255,255,0)); z-index: 10; }
        .search-bar { background: white; border-radius: 8px; display: flex; align-items: center; padding: 10px 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); border: 1px solid #dcdcdc; }
        .icon-back { color: #555; font-size: 18px; margin-right: 12px; cursor: pointer; font-weight: bold; }
        .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; font-weight: bold; color: #222; }
        .icon-clear { background: #ccc; color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; justify-content: center; align-items: center; font-size: 10px; margin-right: 12px; cursor: pointer; font-weight: bold; }
        .icon-mic { color: #4285F4; font-size: 18px; cursor: pointer; margin-right: 12px; }
        .icon-search { color: #555; font-size: 20px; cursor: pointer; font-weight: bold; }
        .recent-search-box { display: none; background: white; margin-top: 8px; padding: 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .recent-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; color: #333; }
        .recent-tags { display: flex; gap: 6px; }
        .tag { background: #edf2f7; padding: 6px 12px; border-radius: 15px; font-size: 12px; color: #4a5568; font-weight: bold; cursor: pointer; }
        .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s ease-out; }
        .bottom-sheet.active { transform: translateY(0); }
        .info-card { background: white; border-radius: 16px 16px 0 0; padding: 16px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .card-header { display: flex; align-items: center; margin-bottom: 8px; }
        .elevator-icon-box { background-color: #1e4e79; color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 6px; font-size: 24px; margin-right: 12px; }
        .status-title { font-size: 16px; font-weight: bold; color: #333; }
        .status-highlight { color: #1e4e79; font-weight: 800; font-size: 17px; }
        .address-text { font-size: 13px; color: #666; margin-top: 2px; }
        .section-title { font-size: 14px; font-weight: bold; color: #222; margin: 12px 0 6px 0; display: flex; justify-content: space-between; align-items: center; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; border: 1px solid #d2d2d2; margin-bottom: 10px; }
        .data-table th, .data-table td { border: 1px solid #d2d2d2; padding: 6px 4px; }
        .data-table th { background-color: #f1f3f5; color: #444; font-weight: bold; width: 23%; }
        .data-table td { font-weight: 500; color: #111; width: 27%; }
        .check-list { font-size: 13px; color: #333; margin-top: 6px; display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #eee; padding-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .check-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #1e4e79; }
        .parking-card { background: white; padding: 12px 16px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 16px; color: #2e7d32; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); padding-bottom: 24px; }
        .parking-badge { background-color: #2e7d32; color: white; border-radius: 4px; width: 20px; height: 20px; display: flex; justify-content: center; align-items: center; font-size: 12px; }
        .custom-marker { background-color: #1e4e79; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); position: relative; white-space: nowrap; cursor: pointer; bottom: 25px; }
        .custom-marker::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #1e4e79 transparent; display: block; width: 0; }
        .custom-marker.stopped { background-color: #d32f2f; }
        .custom-marker.stopped::after { border-color: #d32f2f transparent; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="map"></div>
    <div class="search-bar-wrapper">
        <div class="search-bar">
            <span class="icon-back" onclick="resetUI()">&lt;</span>
            <input type="text" id="searchInput" placeholder="건물명 검색 (예: 산울, 보람)" onfocus="showRecentSearch()" onkeypress="handleKeyPress(event)">
            <span class="icon-clear" onclick="clearSearch()">X</span>
            <span class="icon-mic">🎤</span>
            <span class="icon-search" onclick="executeSearch()">🔍</span>
        </div>
        
        <div class="recent-search-box" id="recentSearchBox">
            <div class="recent-title">추천 검색어 <span style="color:#888; font-size:11px; cursor:pointer;" onclick="clearRecent()">닫기</span></div>
            <div class="recent-tags">
                <div class="tag" onclick="selectTag('산울')">산울</div>
                <div class="tag" onclick="selectTag('보람')">보람</div>
                <div class="tag" onclick="selectTag('세종시청')">세종시청</div>
            </div>
        </div>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="info-card">
            <div class="card-header">
                <div class="elevator-icon-box">🛗</div>
                <div>
                    <div class="status-title">✓ <span class="status-highlight">승강기 있음</span> <span id="resStatus" style="font-size:14px; margin-left:4px;"></span></div>
                    <div class="address-text" id="resAddress"></div>
                </div>
            </div>
            <div class="section-title">상세 제원 및 상태 <span style="color:#777; font-size:11px; font-weight:normal; cursor:pointer;" onclick="resetUI()">닫기</span></div>
            <table class="data-table">
                <tr><th>승강기번호</th><td id="resElevatorNo" style="font-weight:bold; color:#1e4e79;">-</td><th>운행층수</th><td id="resFloors">-</td></tr>
                <tr><th>승강기종류</th><td id="resType">-</td><th>적재하중</th><td id="resWeight">-</td></tr>
                <tr><th>정격속도</th><td id="resSpeed">-</td><th>승강기상태</th><td id="resState" style="font-weight:bold;">-</td></tr>
            </table>
            <div class="check-list">
                <div class="check-item"><input type="checkbox" id="chk1" checked disabled> <label for="chk1">비상용 엘리베이터 피트 배수시설</label></div>
                <div class="check-item"><input type="checkbox" id="chk2" checked disabled> <label for="chk2" id="resMonitor">실시간 상태 모니터링: [조회중]</label></div>
                <div class="check-item"><input type="checkbox" id="chk3" checked disabled> <label for="chk3">휠체어·유모차 이용 가능 여부: [가능]</label></div>
            </div>
        </div>
        <div class="parking-card">
            <div class="parking-badge">✓</div> 주차 가능
        </div>
    </div>
</div>

<script>
    let map;
    let markers = [];
    let geocoder; // 카카오 주소->좌표 변환기

    const DEPLOY_CONFIG = {
        CLOUDFLARE_WORKER_URL: 'https://wild-river-017e.sjh01046934.workers.dev/?url=' 
    };

    const API_CONFIG = {
        SERVICE_KEY: 'bf828022bb4535034959395893c59397fff91ac219c93670610575093972289d',
        BASE_URL: 'https://apis.data.go.kr/B553664/ElevatorInformationService/getElevatorListM'
    };

    function initMap() {
        const container = document.getElementById('map');
        const options = {
            center: new kakao.maps.LatLng(36.4792, 127.2892),
            level: 4
        };
        map = new kakao.maps.Map(container, options);
        geocoder = new kakao.maps.services.Geocoder(); // 지오코더 생성

        kakao.maps.event.addListener(map, 'click', function() {
            resetUI();
        });

        executeSearch(); // 초기 자동 로드
    }

    async function executeSearch() {
        const query = document.getElementById('searchInput').value.trim();
        document.getElementById('recentSearchBox').style.display = 'none';

        if(DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL.includes('내아이디.workers.dev')) return;

        try {
            let targetUrl = '';

            // 카카오 Geocoder 과부하 방지를 위해 전체 검색 시 100건으로 제한, 상세 검색 시 50건
            if (query === '') {
                targetUrl = API_CONFIG.BASE_URL + '?serviceKey=' + API_CONFIG.SERVICE_KEY + '&pageNo=1&numOfRows=100&sido=' + encodeURIComponent('세종') + '&_type=json';
            } else {
                targetUrl = API_CONFIG.BASE_URL + '?serviceKey=' + API_CONFIG.SERVICE_KEY + '&pageNo=1&numOfRows=50&sido=' + encodeURIComponent('세종') + '&buld_nm=' + encodeURIComponent(query) + '&_type=json';
            }
            
            const proxyUrl = DEPLOY_CONFIG.CLOUDFLARE_WORKER_URL + encodeURIComponent(targetUrl);
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("서버 응답 에러");
            
            const result = await response.json();
            
            let items = result.response?.body?.items?.item || [];
            if (!Array.isArray(items)) items = [items];

            if (items.length === 0 || !items[0]) {
                if (query !== '') alert("검색된 승강기 데이터가 없습니다.");
                return;
            }

            // ★ 핵심 변경: 주소 데이터를 바탕으로 진짜 GPS 좌표 변환 (비동기 처리)
            const mappedData = await Promise.all(items.map(apiItem => {
                return new Promise((resolve) => {
                    const stts = apiItem.elvtrSttsNm || apiItem.elvtr_stts_nm || apiItem.elvtrStts || "상태불명";
                    const isOperating = !(stts.includes('정지') || stts.includes('불합격') || stts.includes('고장'));
                    const address = apiItem.address1 || apiItem.address || "";
                    
                    const baseData = {
                        buildingName: apiItem.buldNm || apiItem.buld_nm || "건물명 없음",
                        address: address,
                        type: apiItem.elvtrDivNm || apiItem.elvtr_div_nm || "정보 없음",
                        speed: apiItem.ratedSpeed || apiItem.rated_speed || "정보 없음",
                        floors: apiItem.shuttleSection || apiItem.shuttle_section || "정보 없음",
                        weight: apiItem.liveLoad || apiItem.live_load || "정보 없음",
                        elevatorNo: apiItem.elevatorNo || apiItem.elevator_no || "번호 미상",
                        state: stts,
                        isOperating: isOperating,
                        lat: 36.4792, // 변환 실패 시 기본값 (세종시청)
                        lng: 127.2892
                    };

                    if (!address) {
                        resolve(baseData);
                        return;
                    }

                    // 카카오 주소->좌표 변환
                    geocoder.addressSearch(address, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            // 한 건물에 승강기가 여러 대일 경우 핀이 완전히 겹치지 않도록 미세한 오프셋 추가
                            const offsetLat = (Math.random() - 0.5) * 0.0002; 
                            const offsetLng = (Math.random() - 0.5) * 0.0002;
                            baseData.lat = parseFloat(result[0].y) + offsetLat;
                            baseData.lng = parseFloat(result[0].x) + offsetLng;
                        }
                        resolve(baseData);
                    });
                });
            }));
            
            renderMarkers(mappedData);

            // 검색어를 넣은 경우에만 결과 하나를 자동으로 펼침
            if(query !== '' && mappedData.length > 0) {
                openBottomSheet(mappedData[0]);
            }

        } catch (error) {
            console.error("데이터 연동 실패:", error);
            if (query !== '') alert("공공데이터 서버 통신 에러가 발생했습니다.");
        }
    }

    function renderMarkers(dataArray) {
        markers.forEach(m => m.setMap(null));
        markers = [];

        dataArray.forEach(data => {
            const content = document.createElement('div');
            content.className = data.isOperating ? 'custom-marker' : 'custom-marker stopped';
            content.innerHTML = data.isOperating ? '🛗 ' + data.buildingName : '🛗 ' + data.buildingName + ' (정지)';
            
            content.onclick = function() { openBottomSheet(data); };

            const customOverlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(data.lat, data.lng),
                content: content,
                yAnchor: 1
            });

            customOverlay.setMap(map);
            markers.push(customOverlay);
        });
        
        // 검색결과 위치로 부드럽게 지도 이동
        if(dataArray.length > 0 && document.getElementById('searchInput').value.trim() !== '') {
            map.setCenter(new kakao.maps.LatLng(dataArray[0].lat, dataArray[0].lng));
            map.setLevel(3); // 건물을 잘 볼 수 있도록 레벨 확대
        }
    }

    function openBottomSheet(data) {
        document.getElementById('resStatus').innerHTML = data.isOperating ? '<span style="color:#2e7d32;">(운행중)</span>' : '<span style="color:#d32f2f;">(점검/정지)</span>';
        document.getElementById('resAddress').innerText = data.address;
        document.getElementById('resElevatorNo').innerText = data.elevatorNo;
        document.getElementById('resType').innerText = data.type;
        document.getElementById('resSpeed').innerText = data.speed;
        document.getElementById('resFloors').innerText = data.floors;
        document.getElementById('resWeight').innerText = data.weight;
        
        const stateCell = document.getElementById('resState');
        stateCell.innerText = data.state;
        stateCell.style.color = data.isOperating ? "#1e4e79" : "#d32f2f";
        document.getElementById('resMonitor').innerText = '실시간 상태 모니터링: [' + (data.isOperating ? '정상운행' : '정지') + ']';

        document.getElementById('bottomSheet').classList.add('active');
        map.panTo(new kakao.maps.LatLng(data.lat - 0.001, data.lng));
    }

    function handleKeyPress(e) { if (e.key === 'Enter') { executeSearch(); } }
    function showRecentSearch() { document.getElementById('recentSearchBox').style.display = 'block'; }
    function selectTag(val) { document.getElementById('searchInput').value = val; executeSearch(); }
    function clearSearch() { 
        document.getElementById('searchInput').value = ''; 
        resetUI(); 
        executeSearch();
    }
    function clearRecent() { document.getElementById('recentSearchBox').style.display = 'none'; }
    function resetUI() {
        document.getElementById('bottomSheet').classList.remove('active');
        document.getElementById('recentSearchBox').style.display = 'none';
    }

    window.onload = function() {
        kakao.maps.load(function() {
            initMap();
        });
    };
</script>

</body>
</html>
